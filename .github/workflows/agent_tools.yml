name: ChatUI deploy to hugging face
on:
  push:
    branches:
      - main
jobs:
  register-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python food_delivery_chatbot/data_register.py
  data-preparation:
      runs-on: ubuntu-latest
      needs: register-data
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
      
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.10"
        - name: Install Dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
        - name: Run Data Preparation
          env:
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
          run: python food_delivery_chatbot/prep.py
          
  package-tools:
    runs-on: ubuntu-latest
    needs: data-preparation
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Package tools
        run: python food_delivery_chatbot/tools.py
              
  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    needs: [register-data, data-preparation, package-tools]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Push files to Frontend Hugging face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python hosting/hosting.py
