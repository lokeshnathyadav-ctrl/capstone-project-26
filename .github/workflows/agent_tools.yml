name: ChatUI deploy to hugging face

on:

  push:

    branches:

      - main


jobs:

  register-data:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: "3.10"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Upload Dataset to Hugging Face Hub

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: python food_delivery_chatbot/data_register.py


  # ---------------------------------------------------------
  # Data Base Tool
  # ---------------------------------------------------------

  db-tool:
    
    name: Database tool

    runs-on: ubuntu-latest

    needs: [register-data] 

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v3

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: "3.10"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: database tool

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
       
        run: python food_delivery_chatbot/db_tool.py      
 
  # ---------------------------------------------------------
  # Agent Tools
  # ---------------------------------------------------------

  tools:

    name: Agent tools

    runs-on: ubuntu-latest

    needs: [register-data, db-tool]

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v3

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: "3.10"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Agent tools

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
       
        run: python food_delivery_chatbot/tools.py

  # ---------------------------------------------------------
  # Chat Agent
  # ---------------------------------------------------------

  chat-agent:

    name: Chat Agent

    runs-on: ubuntu-latest

    needs: [register-data, db-tool, tools]

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v3

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: "3.10"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Chat Agent

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
       
        run: python food_delivery_chatbot/chat_agent.py  

  # ---------------------------------------------------------
  # Deploying everything to HF Space
  # ---------------------------------------------------------

  deploy-hosting:

    name: Hosting

    runs-on: ubuntu-latest

    needs: [register-data, db-tool, tools, chat-agent]

    steps:

      - name: Checkout Repository

        uses: actions/checkout@v3

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: "3.10"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      - name: Push files to Frontend Hugging Face Space

        env:

          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
       
        run: python hosting/hosting.py
